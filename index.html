*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',system-ui,sans-serif;background:#FAF8F5;background-image:radial-gradient(circle at 20% 50%,rgba(27,94,59,0.02) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(212,85,42,0.015) 0%,transparent 50%);color:#1A1A2E;overflow-x:hidden;-webkit-font-smoothing:antialiased}

@keyframes scrollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
.fade-in{animation:fadeIn .5s cubic-bezier(.22,1,.36,1) both}
.slide-up{animation:slideUp .6s cubic-bezier(.22,1,.36,1) both}

.safe-top{padding-top:env(safe-area-inset-top,20px)}
.shell-header{padding-top:max(env(safe-area-inset-top,48px),48px)!important}

{diff:1,title:"The Market",parts:["Anna walked to the market on Saturday morning.","She bought apples, bread, and a bunch of flowers.","On the way home she met her neighbor Tom.","Tom asked her to help carry his bags to his car."],qs:[{q:"When did Anna go to the market?",o:["Monday","Saturday","Friday","Sunday"],a:"Saturday"},{q:"What flowers did Anna buy?",o:["Roses","Tulips","A bunch of flowers","Daisies"],a:"A bunch of flowers"},{q:"Who did Anna meet?",o:["Her sister","Tom","A stranger","Mary"],a:"Tom"},{q:"What did Tom ask for?",o:["Directions","A ride home","Help carrying bags","Money"],a:"Help carrying bags"}]},
{diff:1,title:"The Birthday",parts:["Last week was Grandma Rose's 80th birthday.","The family gathered at her house for a surprise party.","Her grandson baked a chocolate cake with strawberries.","Rose blew out all the candles on the first try."],qs:[{q:"How old did Rose turn?",o:["70","75","80","85"],a:"80"},{q:"Where was the party?",o:["A restaurant","Her house","The park","A hotel"],a:"Her house"},{q:"Who baked the cake?",o:["Her daughter","A bakery","Her grandson","Her friend"],a:"Her grandson"},{q:"What kind of cake was it?",o:["Vanilla","Chocolate with strawberries","Lemon","Carrot"],a:"Chocolate with strawberries"}]},
{diff:1,title:"The Morning Walk",parts:["Every morning, Helen walks her dog Max along the river.","They leave the house at seven o'clock sharp.","Max always stops to watch the ducks near the old bridge.","After the walk, Helen has tea and toast for breakfast."],qs:[{q:"What is the dog's name?",o:["Buddy","Rex","Max","Charlie"],a:"Max"},{q:"What time do they leave?",o:["Six o'clock","Seven o'clock","Eight o'clock","Nine o'clock"],a:"Seven o'clock"},{q:"What does Max watch?",o:["Squirrels","Cats","Ducks","Fish"],a:"Ducks"},{q:"What does Helen have for breakfast?",o:["Coffee and eggs","Tea and toast","Cereal","Pancakes"],a:"Tea and toast"}]},
{diff:1,title:"The Bakery",parts:["Every Friday, Paul walks to the bakery on Oak Street.","He always orders a cinnamon roll and a cup of black coffee.","The baker, Mrs. Santos, saves his favorite seat by the counter.","Last Friday, Paul brought his old friend Robert along for the first time."],qs:[{q:"What street is the bakery on?",o:["Elm Street","Oak Street","Main Street","Pine Street"],a:"Oak Street"},{q:"What does Paul always order?",o:["A muffin and tea","A cinnamon roll and black coffee","A croissant and juice","A donut and milk"],a:"A cinnamon roll and black coffee"},{q:"What is the baker's name?",o:["Mrs. Jones","Mrs. Santos","Mrs. Lee","Mrs. Brown"],a:"Mrs. Santos"},{q:"Who did Paul bring last Friday?",o:["His wife","His son","His friend Robert","His neighbor"],a:"His friend Robert"}]},
{diff:2,title:"The Library Visit",parts:["Mr. Chen visits the library every Tuesday afternoon.","He always sits by the window in the reading room.","Last Tuesday he found a book about birds of South America.","He checked it out and read it at the park bench outside."],qs:[{q:"When does Mr. Chen visit the library?",o:["Monday","Wednesday","Tuesday","Thursday"],a:"Tuesday"},{q:"Where does he like to sit?",o:["By the door","By the window","In the back","At a table"],a:"By the window"},{q:"What was the book about?",o:["Cooking","Birds of South America","History","Gardening"],a:"Birds of South America"},{q:"Where did he read the book?",o:["At home","In the car","At the park bench","In the library"],a:"At the park bench"}]},
{diff:2,title:"The Train Ride",parts:["George took the 9:15 train to visit his daughter in the city.","He sat next to a woman who was knitting a red scarf.","The train stopped at five stations before reaching the city.","His daughter Emily met him at the station with her two children."],qs:[{q:"What time was George's train?",o:["8:30","9:15","10:00","9:45"],a:"9:15"},{q:"What COLOR was the scarf?",o:["Blue","Green","Red","Yellow"],a:"Red"},{q:"How many stations did the train stop at?",o:["Three","Four","Five","Six"],a:"Five"},{q:"How many children does Emily have?",o:["One","Two","Three","Four"],a:"Two"}]},
{diff:2,title:"The Picnic",parts:["On Sunday, Clara and her sister went to Riverside Park.","Clara packed sandwiches and lemonade in a blue cooler.","Her sister brought a blanket and a book about gardening.","They sat under the big oak tree near the fountain."],qs:[{q:"What day was the picnic?",o:["Saturday","Sunday","Monday","Friday"],a:"Sunday"},{q:"What color was the cooler?",o:["Red","Green","Blue","Yellow"],a:"Blue"},{q:"What kind of book did her sister bring?",o:["A novel","A cookbook","A gardening book","A travel guide"],a:"A gardening book"},{q:"Where exactly did they sit?",o:["By the lake","Under the oak tree","On a bench","Near the playground"],a:"Under the oak tree"}]},
{diff:3,title:"The Neighborhood Dinner",parts:["Last Thursday, five neighbors gathered at Margaret's house for dinner.","David brought a bottle of red wine from a vineyard in Portugal.","Susan made her famous mushroom soup with thyme from her garden.","After dinner, they played cards until half past nine.","Margaret's cat Luna slept on David's coat the entire evening."],qs:[{q:"How many neighbors gathered?",o:["Three","Four","Five","Six"],a:"Five"},{q:"Where was the wine from?",o:["Spain","Italy","Portugal","France"],a:"Portugal"},{q:"What herb did Susan use in the soup?",o:["Basil","Rosemary","Thyme","Parsley"],a:"Thyme"},{q:"What time did they stop playing cards?",o:["Nine o'clock","Half past nine","Ten o'clock","Half past ten"],a:"Half past nine"},{q:"What was the cat's name?",o:["Luna","Bella","Milo","Oliver"],a:"Luna"},{q:"Whose coat did the cat sleep on?",o:["Margaret's","Susan's","David's","Nobody's"],a:"David's"}]},
{diff:3,title:"The Doctor's Visit",parts:["On Monday morning, Mrs. Park went to Dr. Rivera's clinic on 5th Avenue.","She arrived at 10:30 but had to wait 20 minutes in the blue waiting room.","The nurse, a tall man named James, took her blood pressure first.","Dr. Rivera recommended walking 30 minutes daily and eating more vegetables.","Mrs. Park scheduled her next appointment for March 15th at the front desk."],qs:[{q:"What street was the clinic on?",o:["3rd Avenue","4th Avenue","5th Avenue","6th Avenue"],a:"5th Avenue"},{q:"How long did she wait?",o:["10 minutes","15 minutes","20 minutes","30 minutes"],a:"20 minutes"},{q:"What did the nurse do first?",o:["Took her temperature","Took her blood pressure","Weighed her","Asked questions"],a:"Took her blood pressure"},{q:"What was the nurse's name?",o:["John","James","Joseph","Jake"],a:"James"},{q:"How long should she walk daily?",o:["15 minutes","20 minutes","30 minutes","45 minutes"],a:"30 minutes"},{q:"When is her next appointment?",o:["March 10th","March 12th","March 15th","March 20th"],a:"March 15th"}]},
{diff:3,title:"The Weekend Trip",parts:["On Friday evening, Robert and his wife took the 6 PM bus to the coast.","They stayed at the Blue Harbor Inn, room 204 on the second floor.","Saturday morning they walked to the lighthouse and saw three dolphins.","For lunch they ate grilled fish at a restaurant called The Anchor.","On Sunday they bought a painting of the sunset before catching the noon bus home."],qs:[{q:"What time was the bus?",o:["5 PM","6 PM","7 PM","8 PM"],a:"6 PM"},{q:"What was the hotel room number?",o:["202","204","206","208"],a:"204"},{q:"How many dolphins did they see?",o:["Two","Three","Four","Five"],a:"Three"},{q:"What was the restaurant called?",o:["The Lighthouse","The Anchor","The Harbor","The Pier"],a:"The Anchor"},{q:"What did they buy before leaving?",o:["A seashell","A painting","A book","A hat"],a:"A painting"},{q:"What time was the bus home?",o:["10 AM","11 AM","Noon","1 PM"],a:"Noon"}]},
{diff:4,title:"The Family Reunion",parts:["The Garcia family reunion was held on June 14th at Uncle Pedro's ranch outside Santa Fe.","Thirty-two family members came from six different states, the youngest being baby Sofia, just 4 months old.","Aunt Carmen, who is 78, won the horseshoe tournament for the third year in a row.","Pedro's daughter Maria grilled chicken and corn, while cousin Luis made his famous peach cobbler.","At 7 PM, Grandpa Eduardo gave a speech about how the family first came to America in 1952.","The children found a box of old photographs in the attic, including one of Eduardo's wedding in 1968."],qs:[{q:"What was the exact date of the reunion?",o:["June 12th","June 14th","June 16th","July 14th"],a:"June 14th"},{q:"How many family members came?",o:["Twenty-eight","Thirty","Thirty-two","Thirty-five"],a:"Thirty-two"},{q:"How old is baby Sofia?",o:["2 months","4 months","6 months","8 months"],a:"4 months"},{q:"How many times has Aunt Carmen won the tournament?",o:["Once","Twice","Three times","Four times"],a:"Three times"},{q:"Who made the peach cobbler?",o:["Maria","Pedro","Carmen","Luis"],a:"Luis"},{q:"What year did the family come to America?",o:["1948","1950","1952","1955"],a:"1952"},{q:"What was found in the attic?",o:["Old clothes","Old photographs","Old letters","Old toys"],a:"Old photographs"},{q:"What year was Eduardo's wedding?",o:["1965","1966","1968","1970"],a:"1968"}]},
{diff:4,title:"The Charity Event",parts:["The Maplewood Community Center held its annual charity auction on the last Saturday of November.","Chairwoman Dr. Ellen Foster opened the event at 5:30 PM with a speech about the new children's library.","There were 47 items up for auction, and ticket number 389 won the grand prize: a weekend trip to Vermont.","Local artist Ben Nakamura donated a painting that sold for $1,200, the highest bid of the evening.","The catering was done by Rosalina's Kitchen, and guests said the mushroom risotto was the best dish.","By 9 PM, the event had raised $14,500, which was $2,000 more than last year's total of $12,500."],qs:[{q:"When was the auction held?",o:["Last Saturday of October","Last Saturday of November","First Saturday of November","Last Sunday of November"],a:"Last Saturday of November"},{q:"What time did Dr. Foster's speech start?",o:["5:00 PM","5:30 PM","6:00 PM","6:30 PM"],a:"5:30 PM"},{q:"How many items were in the auction?",o:["43","45","47","50"],a:"47"},{q:"What was the winning ticket number?",o:["386","389","392","398"],a:"389"},{q:"How much did the painting sell for?",o:["$800","$1,000","$1,200","$1,500"],a:"$1,200"},{q:"What was the best dish according to guests?",o:["Grilled salmon","Mushroom risotto","Roast chicken","Pasta primavera"],a:"Mushroom risotto"},{q:"How much money was raised in TOTAL?",o:["$12,500","$13,000","$14,000","$14,500"],a:"$14,500"},{q:"How much MORE was raised than last year?",o:["$1,000","$1,500","$2,000","$2,500"],a:"$2,000"}]}

{diff:1,title:"The Garden",parts:["Every spring, Aunt Mary plants tomatoes in her backyard.","She waters them every morning before breakfast.","Her neighbor Luis always helps carry the heavy bags of soil.","This year she also planted sunflowers along the fence."],qs:[{q:"What does Mary plant every spring?",o:["Roses","Tomatoes","Carrots","Peppers"],a:"Tomatoes"},{q:"When does she water them?",o:["After lunch","Before breakfast","In the evening","At noon"],a:"Before breakfast"},{q:"What does Luis help with?",o:["Watering","Carrying soil","Planting seeds","Picking fruit"],a:"Carrying soil"},{q:"What did she plant along the fence?",o:["Roses","Daisies","Sunflowers","Ivy"],a:"Sunflowers"}]},
{diff:1,title:"The Bus Ride",parts:["Mr. Kim takes the number 7 bus to the senior center every Monday.","He always sits in the third row on the left side.","The driver, a cheerful woman named Rosa, knows him by name.","At the center he plays chess with his friend Arthur."],qs:[{q:"Which bus does Mr. Kim take?",o:["Number 5","Number 7","Number 9","Number 12"],a:"Number 7"},{q:"What day does he go?",o:["Tuesday","Wednesday","Monday","Friday"],a:"Monday"},{q:"What is the driver's name?",o:["Maria","Rosa","Linda","Anna"],a:"Rosa"},{q:"What does he play at the center?",o:["Cards","Checkers","Chess","Dominoes"],a:"Chess"}]},
{diff:2,title:"The Rainy Afternoon",parts:["On Wednesday it rained all afternoon in the small town of Millbrook.","Sarah stayed home and baked oatmeal cookies with her granddaughter Lily.","They used the recipe from Sarah's mother's old blue cookbook.","By four o'clock they had made three dozen cookies and two cups of cocoa."],qs:[{q:"What day did it rain?",o:["Monday","Tuesday","Wednesday","Thursday"],a:"Wednesday"},{q:"What town?",o:["Millfield","Millbrook","Milldale","Millwood"],a:"Millbrook"},{q:"What kind of cookies?",o:["Chocolate chip","Sugar","Oatmeal","Peanut butter"],a:"Oatmeal"},{q:"What color was the cookbook?",o:["Red","Blue","Green","Yellow"],a:"Blue"}]},

{diff:1,title:"Автобус",parts:["Г-н Ким ездит на автобусе №7 в центр для пожилых каждый понедельник.","Он всегда сидит в третьем ряду слева.","Водитель, весёлая женщина по имени Роза, знает его по имени.","В центре он играет в шахматы с другом Артуром."],qs:[{q:"Какой номер автобуса?",o:["5","7","9","12"],a:"7"},{q:"В какой день?",o:["Вторник","Среда","Понедельник","Пятница"],a:"Понедельник"},{q:"Как зовут водителя?",o:["Мария","Роза","Линда","Анна"],a:"Роза"},{q:"Во что он играет?",o:["Карты","Шашки","Шахматы","Домино"],a:"Шахматы"}]},

{diff:3,title:"Книжный клуб",parts:["Клуб чтения собирается каждый второй четверг в общественном зале.","В этом месяце обсуждали детектив, действие которого происходит в Венеции.","Маргарита принесла лимонное печенье и чай с бергамотом.","Пришли пять человек, но Том отсутствовал — он навещал сына в Москве.","После обсуждения выбрали биографию Марии Кюри на следующий месяц."],qs:[{q:"Как часто собирается клуб?",o:["Каждую неделю","Каждый второй четверг","Раз в месяц","Каждую пятницу"],a:"Каждый второй четверг"},{q:"Где происходит действие книги?",o:["Париж","Рим","Венеция","Лондон"],a:"Венеция"},{q:"Что принесла Маргарита?",o:["Кофе","Зелёный чай","Чай с бергамотом","Какао"],a:"Чай с бергамотом"},{q:"Сколько человек пришло?",o:["Четыре","Пять","Шесть","Семь"],a:"Пять"},{q:"Какую книгу выбрали?",o:["Роман","Детектив","Биографию","Поваренную"],a:"Биографию"}]},
{diff:4,title:"Ярмарка во дворе",parts:["Район Дубовый Холм провёл ежегодную ярмарку во вторую субботу сентября.","Участвовали 23 семьи, столы стояли с 8 утра до 14 часов на улице Кленовой.","Семья Петровых продала старые часы за 8500 рублей коллекционеру г-ну Танака.","Дождь начался в 11:30, и Сидоровы перенесли вещи в гараж дома №47.","К полудню собрали 234 000 рублей, из них 50 000 пошли в фонд помощи.","Марта Чен продала больше всех: 67 предметов, включая печатную машинку 1952 года."],qs:[{q:"Когда была ярмарка?",o:["Первая суббота сентября","Вторая суббота сентября","Третья суббота","Последняя суббота"],a:"Вторая суббота сентября"},{q:"Сколько семей участвовало?",o:["19","21","23","25"],a:"23"},{q:"Когда начался дождь?",o:["10:30","11:00","11:30","12:00"],a:"11:30"},{q:"Номер дома Сидоровых?",o:["43","45","47","49"],a:"47"},{q:"Сколько предметов продала Марта?",o:["57","62","67","72"],a:"67"},{q:"Год печатной машинки?",o:["1948","1950","1952","1955"],a:"1952"},{q:"Сколько пошло в фонд?",o:["30 000","40 000","50 000","60 000"],a:"50 000"},{q:"Сколько собрали всего?",o:["134 000","184 000","234 000","284 000"],a:"234 000"}]}],pt:[
